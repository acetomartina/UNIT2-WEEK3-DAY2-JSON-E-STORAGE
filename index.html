<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JSON e STORAGE esercizi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <main>
      <h1 class="text-center mb-2">ESERCIZIO 1 - FORM</h1>
      <form id="form" class="container text-center w-50">
        <h2>Let Us Know You</h2>
        <div class="col-12">
          <label for="name" class="form-label">Name</label>
          <input type="text" class="form-control" id="userName" />
        </div>
        <div class="col-12">
          <label for="surname" class="form-label">Surname</label>
          <input type="text" class="form-control" id="surname" />
        </div>
        <div class="col-12">
          <label for="exampleInputEmail1" class="form-label"
            >Email address</label
          >
          <input
            type="email"
            class="form-control"
            id="email"
            aria-describedby="emailHelp"
          />
        </div>

        <div class="col-12">
          <label for="exampleInputPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" />
        </div>
        <div class="container justify-content-evenly mt-3">
          <button id="saveButton" type="submit" class="btn btn-success">
            Save
          </button>
          <button id="deleteButton" type="button" class="btn btn-danger">
            Remove
          </button>
        </div>
      </form>
      <div id="userCard" class="card ms-3" style="width: 18rem">
        <div class="card-body">
          <h5 id="cardTitle" class="card-title"></h5>
          <h6
            id="cardEmail"
            class="card-subtitle mb-2 text-body-secondary"
          ></h6>
          <p id="cardPassword" class="card-text"></p>
        </div>
      </div>
    </main>
    <script src="./script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
